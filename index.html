<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Photo Display</title>

    <!-- Load the list of images -->
    <script src="images.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;     /* Use 'cover' to fill the screen */
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body>

    <img id="photo" src="" alt="Random Photo">

<script src="images.js"></script>
<script>

const photo = document.getElementById("photo");
let lastIndex = -1;

function showRandomPhoto() {

    if (!window.images || images.length === 0) {
        console.error("No images loaded");
        return;
    }

    let index;

    do {
        index = Math.floor(Math.random() * images.length);
    } while (images.length > 1 && index === lastIndex);

    lastIndex = index;

    photo.style.opacity = 0;

    setTimeout(() => {
        photo.src = images[index];
        photo.onload = () => photo.style.opacity = 1;
    }, 250);
}

window.onload = showRandomPhoto;
document.body.addEventListener("click", showRandomPhoto);

document.addEventListener("keydown", e => {
    if (e.code === "Space") {
        e.preventDefault();
        showRandomPhoto();
    }
});

setInterval(showRandomPhoto, 30000);

</script>

</body>
</html>
